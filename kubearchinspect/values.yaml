# kubearchinspect Helm Chart Values
# Arm Developer Ecosystem - ARM64 Architecture Verification Job
# https://github.com/ArmDeveloperEcosystem/kubearchinspect

# -- Image configuration
# Built and pushed to ECR by the GitHub workflow (see .github/workflows).
# When deployed via Octopus, the Upgrade a Helm Chart step overrides
# image.repository and image.tag from the release (octopus-process.tf), so the
# values here are just the default for a manual `helm install`.
image:
  # <account>.dkr.ecr.<region>.amazonaws.com/kubearchinspect
  repository: ""   # set for manual installs, e.g. 336151728602.dkr.ecr.us-east-1.amazonaws.com/kubearchinspect
  tag: "0.7.0"
  pullPolicy: IfNotPresent

# -- Job configuration
job:
  # Automatically delete the Job this many seconds after completion (success or failure).
  # Set to 0 to delete immediately, or remove/set null to keep indefinitely.
  ttlSecondsAfterFinished: 600

  # Number of retries before marking the Job as failed
  backoffLimit: 2

  # Hard wall-clock limit for the Job, enforced by Kubernetes (not a tool flag).
  activeDeadlineSeconds: 300

  # Restart policy for the pod - must be Never or OnFailure for Jobs
  restartPolicy: Never

# -- kubearchinspect CLI arguments
# The only subcommand is `images`, which scans EVERY running image in the whole
# cluster (it has no namespace filter) and automatically checks newer image
# versions for arm64 support. There is therefore no namespace / check-newer-
# versions / log-level flag — verified against kubearchinspect 0.7.0. The one
# optional knob is verbose debug logging.
inspect:
  # Enable verbose debug logging (passes --debug).
  debug: false

# -- In-cluster kubeconfig
# kubearchinspect defaults its kube config path to ~/.kube/config and does NOT
# fall back to the in-cluster service account, so when it runs as a Job we mount
# a kubeconfig that authenticates with the pod's projected service-account token
# against the in-cluster API, and point the tool at it with --kube-config-path.
# The token and CA are read from the standard service-account mount paths.
kubeconfig:
  # Directory the kubeconfig is mounted into; the file is <mountPath>/kubeconfig.
  mountPath: /etc/kubearchinspect
  # In-cluster API server address (default Kubernetes Service DNS name).
  server: https://kubernetes.default.svc

# -- ServiceAccount
serviceAccount:
  # Create a dedicated ServiceAccount for the Job
  create: true
  # Name of the ServiceAccount. If empty, uses the release name.
  name: ""
  annotations: {}

# -- RBAC
# kubearchinspect needs read access to pods across namespaces to enumerate images
rbac:
  create: true
  # Scope of the role binding.
  # "cluster" creates a ClusterRole + ClusterRoleBinding (can scan all namespaces)
  # "namespace" creates a Role + RoleBinding (scoped to release namespace only)
  scope: cluster

# -- Pod configuration
pod:
  # Annotations to add to the Job pod
  annotations: {}

  # Labels to add to the Job pod
  labels: {}

  # Node selector - pin to arm64 nodes to verify the tool itself runs on Graviton
  nodeSelector:
    kubernetes.io/arch: arm64

  # Tolerations
  tolerations: []

  # Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Security context for the pod
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    # Group-own mounted volumes (the shared emptyDir the ecrAuth init container
    # writes the docker config into) so the non-root user can read/write them.
    fsGroup: 1000

# -- Image pull secrets (for private ECR repos)
# Not needed when nodes have ECR pull access via their instance role (the Auto
# Mode node role includes AmazonEC2ContainerRegistryPullOnly).
imagePullSecrets: []
# - name: ecr-pull-secret

# -- Private-registry auth for kubearchinspect's OWN manifest queries
# kubearchinspect inspects each running image's manifest directly from the
# registry and reads credentials only from $HOME/.docker/config.json — it does
# NOT use Kubernetes imagePullSecrets or the kubelet pull path. So private ECR
# images report an "Authentication Error" unless the tool is handed a docker
# config. When enabled, an init container mints a short-lived ECR token (using
# the pod's AWS credentials — grant the ServiceAccount ECR read via EKS Pod
# Identity or IRSA) and writes it to a shared volume the tool reads via $HOME.
# Octopus enables this automatically (octopus-process.tf sets registry/region);
# leave it off for a plain public-registry `helm install`.
ecrAuth:
  enabled: false
  # ECR registry host, e.g. 336151728602.dkr.ecr.us-east-1.amazonaws.com
  registry: ""
  # AWS region of the registry, e.g. us-east-1
  region: ""
  # AWS CLI image for the init container (must have an arm64 variant)
  awsCliImage: public.ecr.aws/aws-cli/aws-cli:latest

# -- Namespace override. Defaults to the release namespace.
namespaceOverride: ""
